<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Coding with Priti</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        nav {
            position: fixed;
            background: #1b1b1b;
            width: 100%;
            padding: 15px 0;
            z-index: 12;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        nav .menu {
            max-width: 1250px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .menu .logo a {
            text-decoration: none;
            color: #fff;
            font-size: 30px;
            font-weight: 600;
        }

        .menu ul {
            display: inline-flex;
            gap: 10px;
            list-style: none;
        }

        .menu ul li a {
            text-decoration: none;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .menu ul li a:hover, .menu ul li a.active {
            background: #fff;
            color: black;
        }

        .img {
            background: url('landscape.jpg') no-repeat;
            width: 100%;
            height: 100vh;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .img::before {
            content: '';
            position: absolute;
            height: 100%;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            padding: 0 20px;
            text-align: center;
            z-index: 2;
        }

        .center .title {
            color: #fff;
            font-size: 55px;
            font-weight: 600;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
        }

        .center .sub_title {
            color: #fff;
            font-size: 52px;
            font-weight: 600;
        }

        .center .btns {
            margin-top: 25px;
        }

        .center .btns button {
            height: 55px;
            width: 170px;
            border-radius: 30px;
            border: 2px solid white;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        .center .btns button:first-child {
            color: #fff;
            background: none;
        }

        .btns button:first-child:hover {
            background: white;
            color: black;
        }

        .center .btns button:last-child {
            background: white;
            color: black;
        }

        .center .btns button:last-child:hover {
            background: transparent;
            color: white;
        }

        /* --- PROFESSIONAL LOGIN MODAL POPUP --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-top: 6px solid purple;
            position: relative;
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }

        .login-card h2 {
            color: purple;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }

        .login-card h4 {
            color: #666;
            font-weight: 400;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #444;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: purple;
        }

        .btn-submit {
            width: 100%;
            background: purple;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        .modal-links {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .modal-links a {
            color: purple;
            text-decoration: none;
            font-weight: 600;
        }

        .modal-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

  <nav>
    <div class="menu">
      <div class="logo"><a href="#">Coding with priti</a></div>
      <ul>
        <li><a class="active" onclick="toggleModal()">Home / Sign In</a></li>
        <li><a href="page3.html">Gallery System</a></li>
      </ul>
    </div>
  </nav>

  <div class="img"></div>

  <div class="center">
    <div class="title">Create Amazing Website</div>
    <div class="sub_title">Pure HTML & CSS Only</div>
    <div class="btns">
      <button onclick="toggleModal()">Learn More</button>
      <button onclick="triggerSubscribe()">Subscribe</button>
    </div>
  </div>

  <div class="modal-overlay" id="loginModal">
      <div class="login-card">
          <span class="close-btn" onclick="toggleModal()">&times;</span>
          <h2>SBTE-EMS</h2>
          <h4>State Board of Technical Education, Bihar</h4>
          
          <form id="portalLoginForm">
              <div class="form-group">
                  <label>USERNAME</label>
                  <input type="text" placeholder="Enter username" required>
              </div>
              <div class="form-group">
                  <label>PASSWORD</label>
                  <input type="password" placeholder="Enter password" required>
              </div>
              <button type="submit" class="btn-submit">Sign In</button>
          </form>

          <div class="modal-links">
              <a onclick="triggerSubscribe()" style="cursor:pointer;">New Registration</a>
              <a href="page3.html?action=recover">Forgotten Password</a>
          </div>
      </div>
  </div>

  <script>
      function toggleModal() {
          document.getElementById('loginModal').classList.toggle('active');
      }

      function triggerSubscribe() {
          let email = prompt("Enter your email to subscribe to updates:");
          if(email) {
              alert("Awesome! Registration initialized for " + email);
          }
      }

      document.getElementById('portalLoginForm').addEventListener('submit', function(e) {
          e.preventDefault();
          alert("Sign In successful! Welcome to the SBTE Portal dashboard.");
          toggleModal();
      });
  </script>
</body>
</html>
