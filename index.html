<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTE-EMS | Login Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        header {
            text-align: center;
            padding: 30px 20px 10px 20px;
        }

        header h1 {
            color: #4a0e4e;
            font-size: 2.5rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        header h3 {
            color: #666;
            font-size: 1.1rem;
            font-weight: 400;
        }

        .login-container {
            background: white;
            width: 100%;
            max-width: 400px;
            margin: 40px auto;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border-top: 6px solid #4a0e4e;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #4a0e4e;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4a0e4e;
        }

        .btn-submit {
            width: 100%;
            background-color: #4a0e4e;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-submit:hover {
            background-color: #310834;
        }

        footer {
            text-align: center;
            padding: 25px;
            background: #fff;
            border-top: 1px solid #e1e4e8;
        }

        .navigation-links {
            margin-bottom: 10px;
        }

        .navigation-links a {
            margin: 0 15px;
            text-decoration: none;
            color: #4a0e4e;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .navigation-links a:hover {
            color: #00bcd4;
            text-decoration: underline;
        }

        .copyright {
            font-size: 0.85rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>SBTE-EMS</h1>
        <h3>State Board of Technical Education, Bihar</h3>
    </header>
    
    <main>
        <div class="login-container">
            <h2>Log In</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                
                <button type="submit" class="btn-submit">Sign In</button>
            </form>
        </div>
    </main>

    <footer>
        <nav class="navigation-links">
            <a href="project_2.html">New Registration</a>
            <a href="project_3.webpage.html">Forgotten Password</a>
        </nav>
        <p class="copyright">&copy; 2026 SBTE-EMS Bihar. Designed professionally.</p>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop page refresh
            const user = document.getElementById('username').value;
            alert('Welcome back, ' + user + '! Connection successful.');
        });
    </script>

</body>
</html>
