<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration & Portfolio | Coding with Priti</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        nav {
            position: fixed;
            background: #1b1b1b;
            width: 100%;
            padding: 15px 0;
            z-index: 12;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        nav .menu {
            max-width: 1250px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .menu .logo a {
            text-decoration: none;
            color: #fff;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .menu ul {
            display: inline-flex;
            gap: 10px;
        }

        .menu ul li {
            list-style: none;
        }

        .menu ul li a {
            text-decoration: none;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .menu ul li a:hover, .menu ul li a.active {
            background: #fff;
            color: black;
        }

        .img {
            background: url('landscape.jpg') no-repeat;
            width: 100%;
            height: 100vh;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .img::before {
            content: '';
            position: absolute;
            height: 100%;
            width: 100%;
            background: rgba(0, 0, 0, 0.55);
        }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            padding: 0 20px;
            text-align: center;
            z-index: 2;
        }

        .center .title {
            color: #fff;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
        }

        .center .sub_title {
            color: #00bcd4;
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .center .btns {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .center .btns a {
            text-decoration: none;
            height: 55px;
            width: 180px;
            display: inline-block;
            line-height: 51px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-register {
            color: #fff;
            background: transparent;
            border: 2px solid white;
        }

        .btn-register:hover {
            background: white;
            color: black;
        }

        .btn-login {
            background: white;
            color: black;
            border: 2px solid white;
        }

        .btn-login:hover {
            background: transparent;
            color: white;
        }
    </style>
</head>
<body>

  <nav>
    <div class="menu">
      <div class="logo"><a href="index.html">Coding with Priti</a></div>
      <ul>
        <li><a href="index.html">Login Portal</a></li>
        <li><a href="page2.html" class="active">Registration</a></li>
        <li><a href="page3.html">Gallery System</a></li>
      </ul>
    </div>
  </nav>
  
  <div class="img"></div>
  
  <div class="center">
    <div class="title">Create Account Hub</div>
    <div class="sub_title">SBTE Student Registration Platform</div>
    <div class="btns">
      <a href="#" class="btn-register" id="regTrigger">Register Now</a>
      <a href="index.html" class="btn-login">Existing Login</a>
    </div>
  </div>

  <script>
      document.getElementById('regTrigger').addEventListener('click', function(e) {
          e.preventDefault();
          let email = prompt("Enter your Email Address to initialize registration:");
          if (email) {
              alert("Registration verification link dispatched to: " + email);
          }
      });
  </script>
</body>
</html>
